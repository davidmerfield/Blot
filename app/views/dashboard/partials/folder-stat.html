{{#stat}}
  <table class="file-stat">
<tr>
  <td>Path:</td>
  <td>{{path}} <a class="link" style="margin-left: 1rem" href="{{{blog.url}}}{{{path}}}">Copy</a></td>
</tr>

<tr>
  <td>Kind:</td>
  <td>{{kind}}</td>
</tr>

<tr>
  <td>Size:</td>
  <td>{{size}}</td>
</tr>

<tr>
  <td>Created:</td>
  <td>{{created}}</td>
</tr>

<tr>
  <td>Modified:</td>
  <td>{{modified}}</td>
</tr>
</table>

{{/stat}}
