      <script type="text/javascript">
        if (document.cookie.indexOf("signed_into_blot") > -1) {
          document.querySelectorAll(".signed-out").forEach(function (node) {
            node.style.display = "none";

          document.querySelectorAll(".signed-in").forEach(function(node){
            node.style.display = "block";

<style type="text/css">
  
  /* collapse and show menu */

  #toggle-container, .header a#home-link {
    display: none;
    position: relative;
  }

  #toggle-container label {
    cursor: pointer;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  @media (max-width: 768px) {
    .header a#home-link {
      justify-content: center;display:flex
        }
    #toggle-container {
      display: block;
    }
    #menu-toggle {
      display: none;
    }
    #menu-toggle ~ section > section:first-child {
    display: none;
  }

  #menu-toggle ~ section {
  flex-direction: column;
  
}

  }

  #menu-toggle:checked ~ section > section:first-child {
    display: block;
  }








  .signed-in {
    display: none;
  }

  .menu-links a {
    margin: 0 0.4em;
  }

  .cta a {
    background: var(--light-background-color);
    border-radius: 4px;
    color: var(--accent-color);

    line-height: 24px;

</style>
