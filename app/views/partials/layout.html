<!DOCTYPE html>
<html lang="en">
  {{> head}}
  <body>
    {{> header}}
    <section style="display: flex;max-width: 1060px;margin: 0 auto;padding: 2em 0">
      <section  style="flex-grow:0;flex-shrink:0;padding-right: 3rem;position: sticky;top:3rem;max-height:80vh;width: 25%;box-sizing: border-box;">
        {{> navigation}}
        </section>
      <section style="flex-grow:1;padding-left: 2rem;">
        <section style="min-height: 80vh;{{^user}}padding-bottom:8em;{{/user}}">
          {{> breadcrumbs}}
          {{#selected.how}}
          <section style="display: flex;">
            <section style="flex-basis: 66.6666%;flex-grow: 0;">
              {{> body}}
            </section>
            <section style="flex-basis: 33.3333%;flex-shrink0;padding-left: 3rem;box-sizing: border-box;">
              {{> links}}
            </section>
          </section>
          {{/selected.how}}
          {{^selected.how}}
          {{> body}}
          {{/selected.how}}
        </section>
       
        {{> footer-page}}
      </section>
    </section>
    <style>
      .dashboard-container {
        padding-top: 1.5em;
      }
  </style>

    {{> footer}}
  </body>
</html>
