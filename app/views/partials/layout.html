<!DOCTYPE html>
<html lang="en">
  {{> head}}
  <body>
    
    <section style="display: flex;margin: 0 auto;padding: 0">
      <section  style="flex-grow:1;flex-basis:300px;background: #f9f9ff;flex-shrink:0;padding:4rem 2rem;position: sticky;top:0;height:100vh;box-sizing: border-box;">
        {{> navigation}}
        </section>
      <section style="flex-basis:800px;flex-grow:1;padding: 1em 4rem;">
        <section style="min-height: 100vh;{{^user}}padding-bottom:8em;{{/user}}">
          {{> header}}
          {{> breadcrumbs}}
          {{#selected.how}}
          <section style="display: flex;justify-content: space-between;">
            <section style="width: 66.6666%;flex-grow: 0;">
              {{> body}}
            </section>
            <section style="width: 33.3333%;flex-shrink:0;padding-left: 4rem;box-sizing: border-box;">
              {{> links}}
            </section>
          </section>
          {{/selected.how}}
          {{^selected.how}}
          {{> body}}
          {{/selected.how}}

        </section>       
        {{> footer}}
    </section>
    </section>
    <style>
      .dashboard-container {
        padding-top: 1.5em;
      }
  </style>

  </body>
</html>
