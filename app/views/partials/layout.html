<!DOCTYPE html>
<html lang="en">
  {{> head}}
  <body>
    {{> header}}
    <section style="display: flex;">
      <section  style="flex-grow:0;flex-shrink:0;padding: 1.5em 2em;position: sticky;top:4em;max-height:80vh;margin-right: 3vw;">
        {{> navigation}}
        </section>
      <section style="padding: 2em 2em 6em 2em;flex-grow:1">
        <section class="{{#user}}dashboard-container{{/user}}" style="min-height: 80vh;{{^user}}padding-bottom:8em;{{/user}}">
          {{> breadcrumbs}}
          {{> body}}
        </section>
        {{> footer-page}}
      </section>
    </section>
    <style>
      .dashboard-container {
        padding-top: 1.5em;
      }
  </style>

    {{> footer}}
  </body>
</html>
