<!DOCTYPE html>
<html lang="en">
  {{> head}}
  <body>
    {{> header}}
    <section style="display: flex;max-width: 1260px;margin: 0 auto;padding: 2em 0">
      <section  style="flex-grow:0;flex-shrink:0;padding:0 2rem;position: sticky;top:3rem;max-height:80vh;width: 25%;box-sizing: border-box;">
        {{> navigation}}
        </section>
      <section style="width:75%;padding-left: 4rem;">
        <section style="min-height: 80vh;{{^user}}padding-bottom:8em;{{/user}}">
          {{> breadcrumbs}}
          {{#selected.how}}
          <section style="display: flex;justify-content: space-between;">
            <section style="width: 66.6666%;flex-grow: 0;">
              {{> body}}
            </section>
            <section style="width: 33.3333%;flex-shrink:0;padding-left: 4rem;box-sizing: border-box;">
              {{> links}}
            </section>
          </section>
          {{/selected.how}}
          {{^selected.how}}
          {{> body}}
          {{/selected.how}}
        </section>
       
        {{> footer-page}}
      </section>
    </section>
    <style>
      .dashboard-container {
        padding-top: 1.5em;
      }
  </style>

    {{> footer}}
  </body>
</html>
